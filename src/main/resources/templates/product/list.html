<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Danh sách Sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar bg-dark border-bottom border-body mb-4" data-bs-theme="dark">
    <div class="container-fluid" style="padding-left: 40px; padding-right: 40px;">
        <div class="d-flex">
            <a class="navbar-brand text-light" th:href="@{/products}">Home</a>
            <a class="navbar-brand text-light" th:href="@{/products/add}" sec:authorize="hasRole('ADMIN')">Products</a>
            <a class="navbar-brand text-light" th:href="@{/categories}" sec:authorize="hasRole('ADMIN')">Categories</a>
        </div>
        
        <div class="d-flex align-items-center">
            <span class="text-light me-3" sec:authorize="isAuthenticated()">Xin chào, <b sec:authentication="name">Tên_User</b>!</span>
            
            <form th:action="@{/logout}" method="post" class="m-0" sec:authorize="isAuthenticated()">
                <button type="submit" class="btn btn-outline-light btn-sm me-3">Đăng xuất</button>
            </form>

            <a th:href="@{/cart}" class="btn btn-warning btn-sm" sec:authorize="hasRole('USER')">Giỏ hàng</a>
        </div>
    </div>
</nav>

<div class="container body-content">
    <h3 class="mb-3">Danh sách Sản phẩm</h3>
    
    <form th:action="@{/products}" method="get" class="row g-3 mb-4">
        <div class="col-md-3">
            <input type="text" name="keyword" class="form-control" placeholder="Nhập tên sản phẩm..." th:value="${keyword}">
        </div>
        <div class="col-md-3">
            <select name="categoryId" class="form-select">
                <option value="">-- Tất cả danh mục --</option>
                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}" th:selected="${cat.id == categoryId}"></option>
            </select>
        </div>
        <div class="col-md-3">
            <select name="sortDir" class="form-select">
                <option value="asc" th:selected="${sortDir == 'asc'}">Giá: Tăng dần</option>
                <option value="desc" th:selected="${sortDir == 'desc'}">Giá: Giảm dần</option>
            </select>
        </div>
        <div class="col-md-3">
            <button type="submit" class="btn btn-primary">Tìm & Lọc</button>
            <a th:href="@{/products}" class="btn btn-secondary">Xóa lọc</a>
        </div>
    </form>

    <div class="mb-3">
        <a th:href="@{/products/add}" class="btn btn-success" sec:authorize="hasRole('ADMIN')">Tạo sản phẩm mới</a>
        <a th:href="@{/categories}" class="btn btn-info ms-2 text-white" sec:authorize="hasRole('ADMIN')">Quản lý Danh mục</a>
    </div>
    
    <table class="table table-striped table-bordered">
        <thead class="table-dark">
        <tr>
            <th scope="col">#</th>
            <th scope="col">Name</th>
            <th scope="col">Image</th>
            <th scope="col">Price</th>
            <th scope="col">Category Name</th>
            <th scope="col" sec:authorize="hasRole('USER')">Cart</th> <th scope="col" sec:authorize="hasRole('ADMIN')">Action</th> </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${products}">
            <th scope="row" th:text="${product.id}"></th>
            <td th:text="${product.name}"></td>
            <td>
                <img th:if="${product.image != null and product.image != ''}" height="120" width="150" th:src="${product.image}" alt="Product Image">
            </td>
            <td th:text="${product.price}"></td>
            <td th:text="${product.category != null ? product.category.name : ''}"></td>
            
            <td sec:authorize="hasRole('USER')">
                <form th:action="@{/cart/add}" method="post">
                    <input type="hidden" name="productId" th:value="${product.id}">
                    <button type="submit" class="btn btn-success btn-sm">Add</button>
                </form>
            </td>

            <td sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-secondary">Edit</a>
                <a th:href="@{/products/delete/{id}(id=${product.id})}" class="btn btn-danger" onclick="return confirm('Bạn có chắc chắn muốn xóa?');">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>

    <nav th:if="${totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                <a class="page-link" th:href="@{/products(pageNo=${currentPage - 1}, keyword=${keyword}, categoryId=${categoryId}, sortDir=${sortDir})}">Previous</a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                <a class="page-link" th:href="@{/products(pageNo=${currentPage + 1}, keyword=${keyword}, categoryId=${categoryId}, sortDir=${sortDir})}">Next</a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>
