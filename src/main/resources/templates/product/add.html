<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm/Sửa Sản Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar bg-dark border-bottom border-body mb-4" data-bs-theme="dark">
    <div style="padding-left: 40px;">
        <a class="navbar-brand text-light" th:href="@{/products}">Home</a>
        <a class="navbar-brand text-light" th:href="@{/products/add}">Products</a>
    </div>
</nav>

<div class="container body-content">
    <h2 th:text="${product.id != null ? 'Edit Product' : 'Add Product'}"></h2>
    
    <form th:action="@{/products/save}" th:object="${product}" method="post" class="form mt-3" style="max-width: 600px;">
        <input type="hidden" th:field="*{id}" />

        <div class="form-group mb-3">
            <label for="name" class="fw-bold">Name:</label>
            <input class="form-control" type="text" th:field="*{name}" id="name" placeholder="Product Name" required>
        </div>

        <div class="form-group mb-3">
            <label for="image" class="fw-bold">Image URL:</label>
            <input class="form-control" type="text" th:field="*{image}" id="image" placeholder="http://image.jpg">
        </div>

        <div class="form-group mb-3">
            <label for="price" class="fw-bold">Price:</label>
            <input class="form-control" type="number" th:field="*{price}" id="price" placeholder="Price" required>
        </div>

        <div class="form-group mb-4">
            <label for="category" class="fw-bold">Category:</label>
            <select th:field="*{category}" class="form-control" id="category">
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"></option>
            </select>
        </div>

        <button type="submit" class="btn btn-success">Save Product</button>
        <a th:href="@{/products}" class="btn btn-secondary ms-2">Cancel</a>
    </form>
</div>
</body>
</html>
