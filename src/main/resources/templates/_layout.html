<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>Quản lý Sản Phẩm Cute</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #fff5f8; color: #5c415d; }
        .navbar { background-color: #ffb6b9 !important; border-bottom: 3px dashed #ff9a9e !important; box-shadow: 0 4px 15px rgba(255, 182, 185, 0.4); }
        .navbar-brand { font-weight: 700; color: #fff !important; background-color: #fca3cc; padding: 8px 20px; border-radius: 20px; margin-right: 15px; transition: all 0.3s ease; }
        .navbar-brand:hover { background-color: #ff85a1; transform: translateY(-2px); }
        .btn { border-radius: 50px; font-weight: 700; border: none; transition: all 0.2s; }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary { background-color: #8ac6d1; color: white; }
        .btn-success { background-color: #b8e0d2; color: #4a7c59; }
        .btn-warning { background-color: #ffdac1; color: #d68040; }
        .btn-danger { background-color: #ff9a9e; color: white; }
        .cute-card { background: white; border-radius: 25px; padding: 20px; box-shadow: 0 10px 30px rgba(255, 182, 185, 0.2); border: 2px solid #ffe3e4; }
        .table { border-radius: 15px; overflow: hidden; }
        .table thead th { background-color: #e2f0cb; color: #7a9c46; text-align: center; border: none; }
        .table tbody td, .table tbody th { vertical-align: middle; text-align: center; border-color: #fbe6e7; }
        h2 { font-weight: 700; color: #ff85a1; text-align: center; margin-bottom: 25px;}
        .form-control, .form-select { border-radius: 15px; border: 2px solid #fbe6e7; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <div class="d-flex">
            <a class="navbar-brand" th:href="@{/products}">🏠 Trang chủ</a>
            <a class="navbar-brand" th:href="@{/products/add}">✨ Thêm sản phẩm</a>
        </div>
    </div>
</nav>

<div layout:fragment="content" class="container mt-5">
</div>

<div class="text-center mt-5 mb-4" style="color: #ff9a9e; font-weight: 700;">
    <p>🌸 &copy; 2026 - Phát triển ứng dụng J2EE siêu cấp đáng yêu 🌸</p>
</div>
</body>
</html>
