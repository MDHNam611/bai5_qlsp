<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Giỏ hàng của bạn</h2>
    <a th:href="@{/products}" class="btn btn-primary mb-3">Tiếp tục mua sắm</a>
    
    <table class="table table-bordered align-middle">
        <thead class="table-dark">
        <tr>
            <th>Tên sản phẩm</th>
            <th>Hình ảnh</th>
            <th>Giá</th>
            <th>Số lượng</th>
            <th>Tổng cộng</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${cartItems}">
            <td th:text="${item.name}"></td>
            <td>
                <img th:if="${item.image != null and item.image != ''}" th:src="${item.image}" height="80" width="100" alt="Product Image">
            </td>
            <td th:text="${item.price} + ' VNĐ'"></td>
            <td style="width: 150px;">
                <form th:action="@{/cart/update}" method="post" class="d-flex">
                    <input type="hidden" name="productId" th:value="${item.productId}">
                    <input type="number" name="quantity" th:value="${item.quantity}" min="1" class="form-control form-control-sm me-2">
                    <button type="submit" class="btn btn-info btn-sm text-white">Cập nhật</button>
                </form>
            </td>
            <td th:text="${item.getTotal()} + ' VNĐ'"></td>
            <td>
                <a th:href="@{/cart/remove/{id}(id=${item.productId})}" class="btn btn-danger btn-sm" onclick="return confirm('Xóa sản phẩm này khỏi giỏ hàng?');">Xóa</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(cartItems)}">
            <td colspan="6" class="text-center text-danger fw-bold">Giỏ hàng của bạn đang trống!</td>
        </tr>
        </tbody>
    </table>
    
    <div class="text-end mt-4" th:if="${not #lists.isEmpty(cartItems)}">
        <h4>Tổng tiền: <span th:text="${totalPrice} + ' VNĐ'" class="text-danger"></span></h4>
        <a th:href="@{/checkout}" class="btn btn-success btn-lg mt-2">Tiến hành Đặt hàng</a>
    </div>
</div>
</body>
</html>
