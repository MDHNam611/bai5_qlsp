<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thanh toán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Xác nhận Đặt hàng</h2>
    <div class="row mt-4">
        <div class="col-md-6">
            <h4>Thông tin giao hàng</h4>
            <form th:action="@{/checkout}" method="post">
                <div class="mb-3">
                    <label class="form-label">Họ và tên</label>
                    <input type="text" class="form-control" name="customerName" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Số điện thoại</label>
                    <input type="text" class="form-control" name="phone" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Địa chỉ</label>
                    <textarea class="form-control" name="address" rows="3" required></textarea>
                </div>
                <button type="submit" class="btn btn-success btn-lg">Hoàn tất Đặt hàng</button>
                <a th:href="@{/cart}" class="btn btn-secondary btn-lg">Quay lại giỏ hàng</a>
            </form>
        </div>
        <div class="col-md-6">
            <h4>Tóm tắt đơn hàng</h4>
            <ul class="list-group mb-3">
                <li class="list-group-item d-flex justify-content-between lh-sm" th:each="item : ${cartItems}">
                    <div>
                        <h6 class="my-0" th:text="${item.name}">Product name</h6>
                        <small class="text-muted" th:text="'Số lượng: ' + ${item.quantity}">Quantity</small>
                    </div>
                    <span class="text-muted" th:text="${item.getTotal()} + ' VNĐ'"></span>
                </li>
                <li class="list-group-item d-flex justify-content-between bg-light">
                    <div class="text-success">
                        <h6 class="my-0">Tổng cộng (VNĐ)</h6>
                    </div>
                    <span class="text-success fw-bold" th:text="${totalPrice}"></span>
                </li>
            </ul>
        </div>
    </div>
</div>
</body>
</html>
