<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Danh mục</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar bg-dark border-bottom border-body mb-4" data-bs-theme="dark">
    <div class="container-fluid" style="padding-left: 40px; padding-right: 40px;">
        <div class="d-flex">
            <a class="navbar-brand text-light" th:href="@{/products}">Sản phẩm</a>
            <a class="navbar-brand text-light" th:href="@{/categories}" sec:authorize="hasRole('ADMIN')">Danh mục</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="mb-4">Danh sách Danh mục</h2>
    <a th:href="@{/categories/add}" class="btn btn-primary mb-3" sec:authorize="hasRole('ADMIN')">Thêm Danh mục mới</a>
    
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Tên Danh mục</th>
            <th sec:authorize="hasRole('ADMIN')">Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="category : ${categories}">
            <td th:text="${category.id}"></td>
            <td th:text="${category.name}"></td>
            <td sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/categories/edit/{id}(id=${category.id})}" class="btn btn-warning btn-sm">Sửa</a>
                <a th:href="@{/categories/delete/{id}(id=${category.id})}" class="btn btn-danger btn-sm" onclick="return confirm('Bạn có chắc chắn muốn xóa danh mục này?');">Xóa</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
