<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm/Sửa Danh mục</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 th:text="${category.id == 0 ? 'Thêm Danh mục mới' : 'Cập nhật Danh mục'}"></h2>
    
    <form th:action="@{/categories/save}" th:object="${category}" method="post" class="mt-4" style="max-width: 500px;">
        <input type="hidden" th:field="*{id}" />
        
        <div class="mb-3">
            <label for="name" class="form-label">Tên Danh mục:</label>
            <input type="text" id="name" th:field="*{name}" class="form-control" placeholder="Nhập tên danh mục..." required>
            <div class="text-danger mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>
        
        <button type="submit" class="btn btn-success">Lưu Danh mục</button>
        <a th:href="@{/categories}" class="btn btn-secondary">Quay lại</a>
    </form>
</div>
</body>
</html>
